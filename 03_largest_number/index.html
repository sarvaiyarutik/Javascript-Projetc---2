<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="main_form">

            
            <h1>Largest Number</h1>


            <form id="form">

                <div class="form_type">

                    <label for="" class="start_number">First Number :</label>

                    <input type="number" id="firstNumber" placeholder="Enter first Number" class="form_type" required>

                </div>

             
                <div class="form_type">

                    <label for="" class="Second_number">Second Number :</label>

                    <input type="number" id="secondNumber" placeholder="Enter Second Number" class="form_type" required>
                </div>

                <div class="form_type">


                    <label for="" class="third_number">Third Number :</label>

                    <input type="number" id="thirdnumber" placeholder="Enter Third Number" class="form_type" required>
                </div>

                <button type="submit" class="btn">Check</button>


                <div id="result"></div>

            </form>

            <script src="./script.js"></script>
        </div>
        </div>
    
    
</body>
</html>
